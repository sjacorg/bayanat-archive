{% extends "base.html" %}

{% block content %}
<div class="py-4 lg:py-8">

    <!-- Search -->
    <div
        class="flex items-center gap-6 mb-10"
        x-data
        x-init="
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q');
            if (q) {
                $refs.q.value = q;
            }
            $nextTick(() => htmx.ajax('GET', '/search' + window.location.search, { target: '#results' }));
        "
    >
        <h1 class="hidden text-xl font-medium tracking-tight text-primary shrink-0 md:text-4xl md:font-light md:block">Search</h1>
        <label class="input w-full">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
                >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input
                x-ref="q"
                type="search"
                name="q"
                placeholder="Search {{ total }} documents..."
                class="text-base"
                hx-get="/search"
                hx-trigger="keyup[key=='Enter'], input[this.value=='']"
                hx-target="#results"
                hx-indicator="#loading"
                hx-disabled-elt="this"
                hx-push-url="true"
                hx-on:htmx:before-request="
                    const u = new URL(window.location);
                    this.value ? u.searchParams.set('q', this.value) : u.searchParams.delete('q');
                    history.replaceState({}, '', u);
                "
            >
        </label>
    </div>

    <!-- Loading skeleton -->
    <div id="loading" class="htmx-indicator">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {% for _ in range(4) %}
            <div class="skeleton h-64 w-full"></div>
            {% endfor %}
        </div>
    </div>

    <!-- Results (HTMX target) -->
    <div id="results"></div>

</div>
{% endblock %}
