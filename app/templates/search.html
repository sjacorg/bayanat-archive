{% extends "base.html" %}

{% block content %}
<div class="py-4 lg:py-8">

    <!-- Search -->
    <div class="flex items-center gap-6 mb-10">
        <h1 class="hidden text-xl font-medium tracking-tight text-primary shrink-0 md:text-4xl md:font-light md:block">Search</h1>
        <label class="input w-full">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
                >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input
                type="search"
                name="q"
                placeholder="Search documents..."
                class="text-base"
                hx-get="/search"
                hx-trigger="keyup changed delay:300ms"
                hx-target="#results"
                hx-push-url="true"
                hx-indicator="#loading"
            >
        </label>
    </div>

    <!-- Loading skeleton -->
    <div id="loading" class="htmx-indicator">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {% for _ in range(4) %}
            <div class="skeleton h-64 w-full"></div>
            {% endfor %}
        </div>
    </div>

    <!-- Results (HTMX target) -->
    <div id="results">
        <p class="text-base-content/50 text-center py-20">
            Archive not yet loaded. Run <code class="bg-base-300 px-2 py-1 rounded text-sm">flask import-archive</code> to populate.
        </p>
    </div>

</div>
{% endblock %}
