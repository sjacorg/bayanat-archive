{# slot_expr: Alpine JS expression evaluating to an integer index, e.g. "prevSlotIndex" or "nextSlotIndex" #}
{# mode: 'desktop' or 'mobile' #}

{# Image #}
<template x-if="mediaAt({{ slot_expr }})?.media_kind === 'image'">
  {% if mode == 'desktop' %}
  <div class="flex w-full justify-center py-2">
    <img :src="mediaAt({{ slot_expr }}).src" loading="eager" draggable="false" @dragstart.prevent
         class="block h-auto w-auto max-h-[70vh] max-w-[min(100%,56rem)] select-none bg-slate-50">
  </div>
  {% else %}
  <div class="p-3">
    <img :src="mediaAt({{ slot_expr }}).src" loading="eager" draggable="false" @dragstart.prevent
         class="h-auto w-full select-none bg-white">
  </div>
  {% endif %}
</template>

{# Video #}
<template x-if="mediaAt({{ slot_expr }})?.media_kind === 'video'">
  {% if mode == 'desktop' %}
  <div class="flex w-full justify-center py-2">
    <video :src="mediaAt({{ slot_expr }}).src" controls preload="metadata"
           class="block h-auto w-auto max-h-[72vh] max-w-[min(100%,60rem)] border border-slate-700/30 bg-black"></video>
  </div>
  {% else %}
  <div class="p-3">
    <video :src="mediaAt({{ slot_expr }}).src" controls preload="metadata"
           class="h-auto w-full border border-slate-700/30 bg-black"></video>
  </div>
  {% endif %}
</template>

{# Audio #}
<template x-if="mediaAt({{ slot_expr }})?.media_kind === 'audio'">
  {% if mode == 'desktop' %}
  <div class="flex w-full justify-center py-2">
    <div class="w-full max-w-[46rem] border border-slate-300 border-l-4 border-l-[#3D9B8F] bg-white p-5">
      <p class="m-0 text-base font-bold" x-text="mediaAt({{ slot_expr }})?.title || 'Audio file'"></p>
      <audio :src="mediaAt({{ slot_expr }}).src" controls preload="metadata" class="mt-3 w-full accent-[#1A4540]"></audio>
    </div>
  </div>
  {% else %}
  <div class="p-3">
    <div class="border border-slate-300 border-l-[3px] border-l-[#3D9B8F] bg-white p-3">
      <p class="m-0 text-sm font-bold" x-text="mediaAt({{ slot_expr }})?.title || 'Audio file'"></p>
      <audio :src="mediaAt({{ slot_expr }}).src" controls preload="metadata" class="mt-2 w-full accent-[#1A4540]"></audio>
    </div>
  </div>
  {% endif %}
</template>

{# PDF / DOCX / other: show a simple placeholder card #}
<template x-if="['pdf','docx','other'].includes(mediaAt({{ slot_expr }})?.media_kind)">
  <div class="flex min-h-[50vh] w-full items-center justify-center">
    <div class="text-center text-slate-400">
      <p class="text-sm" x-text="mediaAt({{ slot_expr }})?.filename || ''"></p>
    </div>
  </div>
</template>
