<template x-if="currentMedia && currentMedia.media_kind === 'audio' && isKindLoading('audio')">
    {% set loading_text = 'Loading audio preview...' %}
    {% set loading_max_class = 'max-w-[46rem]' %}
    {% set loading_stage_class = 'min-h-[42vh]' %}
    {% set loading_frame_class = 'h-36' %}
    {% include 'partials/media/loading.html' %}
</template>

<template x-if="currentMedia && currentMedia.media_kind === 'audio' && hasKindError('audio')">
    {% if mode == 'desktop' %}
    {{ preview_unavailable_card('Audio preview unavailable', 'We could not load this audio in the viewer.', 'Download audio') }}
    {% else %}
    {{ preview_unavailable_card('Audio preview unavailable', 'We could not load this audio in the viewer.', 'Download audio', 'mx-3 my-3 w-auto') }}
    {% endif %}
</template>

<template x-if="currentMedia && currentMedia.media_kind === 'audio' && isKindReady('audio')">
    {% if mode == 'desktop' %}
    <div class="w-full max-w-[46rem] border border-slate-300 border-l-4 border-l-[#3D9B8F] bg-white p-5 shadow-sm">
        <div class="mb-3 flex items-start justify-between gap-3">
            <div class="min-w-0">
                <p class="m-0 text-base font-bold leading-tight text-slate-900" x-text="currentMedia.title || 'Audio file'"></p>
                <p class="mt-1 break-all text-sm text-slate-600" x-text="currentMedia.filename || 'Audio file'"></p>
            </div>
            <span class="shrink-0 border border-[#5AB5A9] bg-[#e8f4f2] px-2 py-1 text-xs font-bold uppercase tracking-wide text-[#1A4540]">Audio</span>
        </div>
        <div class="doc-audio-wave-bg mb-3 h-12 border border-slate-300" aria-hidden="true"></div>
        <audio :src="currentMedia.src" controls preload="metadata" @loadeddata="setMediaReady('audio')" @canplay="setMediaReady('audio')" @error="setMediaError('audio')" class="w-full accent-[#1A4540]"></audio>
    </div>
    {% else %}
    <div class="grid gap-3 p-3">
        <div class="border border-slate-300 border-l-[3px] border-l-[#3D9B8F] bg-white p-3 shadow-sm">
            <div class="mb-2 flex items-start justify-between gap-2">
                <div class="min-w-0">
                    <p class="m-0 text-sm font-bold leading-tight text-slate-900" x-text="currentMedia.title || 'Audio file'"></p>
                    <p class="mt-1 break-all text-xs text-slate-600" x-text="currentMedia.filename || 'Audio file'"></p>
                </div>
                <span class="shrink-0 border border-[#5AB5A9] bg-[#e8f4f2] px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide text-[#1A4540]">Audio</span>
            </div>
            <div class="doc-audio-wave-bg mb-2 h-10 border border-slate-300" aria-hidden="true"></div>
            <audio :src="currentMedia.src" controls preload="metadata" @loadeddata="setMediaReady('audio')" @canplay="setMediaReady('audio')" @error="setMediaError('audio')" class="w-full accent-[#1A4540]"></audio>
        </div>
    </div>
    {% endif %}
</template>
